         <h2>Formulario de contacto</h2>

<div class="container">
  <form action="Confirmación de Envío.html">
    <label for="fname">nombre</label>
    <input type="text" id="fname" name="nombre" placeholder="tu nombre..">

    <label for="lname">Apellido</label>
    <input type="text" id="lname" name="lastname" placeholder="tu apellido..">

    <label for="pais">pais</label>
    <select id="pais" name="pais">
      <option value="australia">Australia</option>
      <option value="canada">Canada</option>
      <option value="argentina">argentina</option>
      <option value="mexico">mexico</option>
      <option value="chile">chile</option>
      <option value="italia">italia</option>
    </select>

    <label for="mensaje">mensaje</label>
    <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje.." style="height:200px"></textarea>

    <input type="submit" value="enviar">
  </form>
